<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NapasVPN</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      /* Dark Leaflet tooltip */
      .map-tooltip {
        background: #1e1e28 !important;
        border: 1px solid #c4956a !important;
        color: #c4956a !important;
        font-size: 11px !important;
        font-weight: 600 !important;
        padding: 3px 8px !important;
        border-radius: 6px !important;
        box-shadow: 0 0 10px rgba(196,149,106,0.3) !important;
        white-space: nowrap !important;
      }
      .map-tooltip::before { display: none !important; }
      .leaflet-control-zoom a {
        background: #1e1e28 !important;
        color: #c4956a !important;
        border-color: #2e2e3e !important;
      }
      .leaflet-control-zoom a:hover {
        background: #26263a !important;
      }
    </style>
  </head>

    <div id="root"></div>
