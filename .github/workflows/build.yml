name: Build Windows Installer

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build React + Electron installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NapasVPN-Windows-Installer
          path: |
            dist/*.exe
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: NapasVPN v${{ github.run_number }}
          body: |
            ## Установка
            1. Скачай `NapasVPN Setup.exe`
            2. Запусти и установи
            3. При первом запуске приложение само скачает xray-core (~5 МБ)
            4. Вставь VLESS-ключ и нажми CONNECT
          files: dist/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
