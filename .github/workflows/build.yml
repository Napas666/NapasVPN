name: Build Windows Installer

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build napas-ss-proxy (Outline prefix helper)
        working-directory: helper
        run: go build -o ../assets/napas-ss-proxy.exe .

      - name: Fetch sing-box + wintun (TUN engine)
        shell: pwsh
        run: |
          $sb = "1.13.14"
          Invoke-WebRequest "https://github.com/SagerNet/sing-box/releases/download/v$sb/sing-box-$sb-windows-amd64.zip" -OutFile sb.zip
          Expand-Archive sb.zip -DestinationPath sb -Force
          Copy-Item "sb/sing-box-$sb-windows-amd64/sing-box.exe" "assets/sing-box.exe"
          Invoke-WebRequest "https://www.wintun.net/builds/wintun-0.14.1.zip" -OutFile wintun.zip
          Expand-Archive wintun.zip -DestinationPath wt -Force
          Copy-Item "wt/wintun/bin/amd64/wintun.dll" "assets/wintun.dll"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React + Electron installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NapasVPN-Windows-Installer
          path: |
            dist/*.exe
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: NapasVPN v${{ github.run_number }}
          body: |
            ## Установка
            1. Скачай `NapasVPN Setup.exe`
            2. Запусти и установи
            3. При первом запуске приложение само скачает xray-core (~5 МБ)
            4. Вставь VLESS-ключ и нажми CONNECT
          files: dist/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
